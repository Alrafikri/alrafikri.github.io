  <path d="M116 98 Q120 120 118 140 Q114 160 110 180" stroke="#f5f0e8" stroke-width="1" fill="none" opacity="0.08"/>
  <rect x="82" y="98" width="36" height="82" rx="18" fill="#f5f0e8" opacity="0.06"/>

