  <path d="M102 52 Q106 38 114 28 Q120 22 126 18" stroke="#e8a0b4" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M102 52 Q112 40 122 36 Q132 32 142 30" stroke="#e8a0b4" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Ears -->
  <ellipse cx="78" cy="60" rx="10" ry="20" fill="#f5f0e8" opacity="0.15" transform="rotate(-15 78 60)"/>
  <ellipse cx="122" cy="60" rx="10" ry="20" fill="#f5f0e8" opacity="0.15" transform="rotate(15 122 60)"/>

